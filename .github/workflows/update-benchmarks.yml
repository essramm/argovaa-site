name: Update AI benchmark data

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6am UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update-benchmarks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run benchmark scraper
        run: python scripts/fetch_benchmarks.py

      - name: Commit updated data
        run: |
          git config user.name "argovaa-benchmark-bot"
          git config user.email "bot@argovaa.com"
          git add data/benchmarks.json
          git diff --staged --quiet || git commit -m "Auto-update benchmark data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
